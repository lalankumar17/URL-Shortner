<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="card card-body" style="text-align: center; border-radius: 12px; padding: 50px 30px;">
            <h1 style="color: var(--primary-teal); font-size: 4rem; margin-bottom: 10px;">404</h1>
            <h2 style="margin-bottom: 20px; color: var(--text-main);">Link Not Found</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">The URL you are looking for does not exist.</p>
            <a href="/" class="action-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 12px 30px;">Go Home</a>
        </div>
    </div>
</body>
</html>
